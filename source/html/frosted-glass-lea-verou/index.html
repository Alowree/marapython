<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Frosted Glass</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main>
      <blockquote>
        <p>我热爱工作，就像别人热衷于高尔夫球一样。我依旧爱着它，有多少次我恳请从桥牌赛、晚宴、舞会上逃离，宁愿在办公室里待着。又有多少次我悄悄从乡村家庭周末聚会上溜走，只为享受打字机前几个小时的时光。</p>
        <p>所以说对工作的热爱是可以培养的，就像对娱乐的热爱一样。这两者是可以互换的。别人认为是工作，而我认为是一种娱乐，而别人认为是娱乐的，我却认为是工作。我们只有在自己所热爱的事情上才能做得更好。</p>
        <footer>
          <cite>
            克劳德·霍普金斯，科学的广告
          </cite>
        </footer>
      </blockquote>
    </main>
  </body>
</html>
